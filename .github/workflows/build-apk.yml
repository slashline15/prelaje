name: Build Android APK

on:
  push:
    branches:
      - feature/flutter-api-integration
      - master
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'URL base da API (ex: http://SEU_IP:8000)'
        required: false
        default: 'http://10.0.2.2:8000'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build APK (debug — sem keystore)
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url || 'http://10.0.2.2:8000' }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: prelaje-debug-${{ github.sha }}
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
